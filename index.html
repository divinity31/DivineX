<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DivineX</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- CryptoJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    
    <!-- Anime.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    
    <!-- Moment.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        :root {
            --primary: #00a884;
            --primary-dark: #008f72;
            --primary-light: #00c28e;
            --bg-dark: #111b21;
            --bg-sidebar: #1f2c33;
            --bg-header: #202c33;
            --bg-input: #2f3b43;
            --text-light: #e9edef;
            --text-muted: #8696a0;
            --border-color: #2f3b43;
            --sent-msg: #005c4b;
            --received-msg: #202c33;
            --danger: #ff4d4d;
            --warning: #ffaa33;
            --success: #00a884;
        }

        body {
            background: linear-gradient(135deg, #0a1015 0%, #111b21 100%);
            min-height: 100vh;
            color: var(--text-light);
            position: relative;
            overflow-x: hidden;
        }

        /* Animated Background */
        #particles-js {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.5;
        }

        /* Auth Container */
        #authContainer {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .auth-card {
            width: 100%;
            max-width: 450px;
            background: rgba(32, 44, 51, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 168, 132, 0.2);
            animation: cardFloat 3s ease-in-out infinite;
        }

        @keyframes cardFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-header h1 {
            font-size: 3em;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .auth-header p {
            color: var(--text-muted);
        }

        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: var(--bg-input);
            padding: 5px;
            border-radius: 50px;
        }

        .auth-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .auth-tab.active {
            background: var(--primary);
            color: white;
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            background: var(--bg-input);
            border: none;
            border-radius: 15px;
            color: var(--text-light);
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            box-shadow: 0 0 0 2px var(--primary);
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 168, 132, 0.4);
        }

        .error-message {
            color: var(--danger);
            margin-top: 10px;
            text-align: center;
            font-size: 14px;
        }

        /* Main App */
        #appContainer {
            display: none;
            min-height: 100vh;
        }

        /* Navigation */
        .nav-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(31, 44, 51, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .nav-logo {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-menu {
            display: flex;
            gap: 30px;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-item i {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .nav-item span {
            font-size: 12px;
        }

        .nav-item:hover,
        .nav-item.active {
            color: var(--primary);
        }

        .nav-item.active::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--primary);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: scaleX(0); }
            to { transform: scaleX(1); }
        }

        .nav-profile {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .nav-profile:hover {
            border-color: var(--primary);
            transform: scale(1.1);
        }

        .nav-profile img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Main Content */
        .main-content {
            margin-top: 80px;
            padding: 20px;
            display: flex;
            gap: 20px;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Left Sidebar - Chats */
        .left-sidebar {
            width: 30%;
            background: var(--bg-sidebar);
            border-radius: 20px;
            overflow: hidden;
            height: calc(100vh - 120px);
            position: sticky;
            top: 100px;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-header h3 {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--primary);
        }

        .chat-search {
            padding: 15px;
        }

        .chat-search input {
            width: 100%;
            padding: 12px 20px;
            background: var(--bg-input);
            border: none;
            border-radius: 30px;
            color: var(--text-light);
            font-size: 14px;
        }

        .chat-search input:focus {
            outline: none;
            box-shadow: 0 0 0 2px var(--primary);
        }

        .chat-list {
            overflow-y: auto;
            height: calc(100% - 150px);
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-bottom: 1px solid var(--border-color);
        }

        .chat-item:hover {
            background: var(--bg-header);
            transform: translateX(5px);
        }

        .chat-item.active {
            background: var(--bg-header);
            border-left: 3px solid var(--primary);
        }

        .chat-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin-right: 15px;
            overflow: hidden;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .chat-info {
            flex: 1;
        }

        .chat-name {
            font-weight: 600;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chat-status {
            font-size: 12px;
            color: var(--text-muted);
        }

        .online-dot {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        /* Center Content - Feed */
        .center-content {
            width: 40%;
        }

        .story-section {
            background: var(--bg-sidebar);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            overflow-x: auto;
        }

        .story-container {
            display: flex;
            gap: 20px;
        }

        .story-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        .story-ring {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--primary), var(--warning));
            padding: 3px;
            margin-bottom: 8px;
            animation: rotate 10s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .story-avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: var(--bg-sidebar);
            padding: 3px;
        }

        .story-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .story-name {
            font-size: 12px;
            color: var(--text-muted);
        }

        .feed-post {
            background: var(--bg-sidebar);
            border-radius: 20px;
            margin-bottom: 20px;
            overflow: hidden;
            animation: postAppear 0.5s ease;
        }

        @keyframes postAppear {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .post-header {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
        }

        .post-user {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .post-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            overflow: hidden;
            background: var(--primary);
        }

        .post-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .post-username {
            font-weight: 600;
        }

        .post-time {
            font-size: 12px;
            color: var(--text-muted);
        }

        .post-content {
            padding: 20px;
        }

        .post-text {
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .post-media {
            margin-bottom: 15px;
            border-radius: 15px;
            overflow: hidden;
        }

        .post-media img,
        .post-media video {
            width: 100%;
            max-height: 500px;
            object-fit: cover;
        }

        .post-actions {
            padding: 15px 20px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 20px;
        }

        .post-action {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.3s ease;
        }

        .post-action:hover {
            color: var(--primary);
            transform: scale(1.1);
        }

        .post-action.liked {
            color: var(--danger);
            animation: likePop 0.3s ease;
        }

        @keyframes likePop {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }

        .post-comments {
            padding: 15px 20px;
            border-top: 1px solid var(--border-color);
        }

        .comment-item {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .comment-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            overflow: hidden;
            background: var(--primary);
        }

        .comment-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .comment-content {
            flex: 1;
        }

        .comment-username {
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 3px;
        }

        .comment-text {
            font-size: 13px;
            color: var(--text-muted);
        }

        .comment-time {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 3px;
        }

        /* Right Sidebar - Trends */
        .right-sidebar {
            width: 30%;
            background: var(--bg-sidebar);
            border-radius: 20px;
            height: calc(100vh - 120px);
            position: sticky;
            top: 100px;
            overflow-y: auto;
        }

        .trending-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .trending-header h3 {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--primary);
        }

        .trend-item {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .trend-item:hover {
            background: var(--bg-header);
            transform: translateX(5px);
        }

        .trend-category {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        .trend-name {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .trend-stats {
            font-size: 12px;
            color: var(--text-muted);
        }

        .suggested-users {
            padding: 20px;
        }

        .suggested-users h4 {
            margin-bottom: 15px;
            color: var(--primary);
        }

        .suggested-user {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            cursor: pointer;
        }

        .suggested-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            overflow: hidden;
            background: var(--primary);
        }

        .suggested-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .suggested-info {
            flex: 1;
        }

        .suggested-name {
            font-weight: 600;
            margin-bottom: 3px;
        }

        .suggested-bio {
            font-size: 12px;
            color: var(--text-muted);
        }

        .follow-btn {
            padding: 5px 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .follow-btn:hover {
            background: var(--primary-dark);
            transform: scale(1.05);
        }

        .follow-btn.following {
            background: var(--bg-input);
            color: var(--text-muted);
        }

        /* Create Post Modal */
        .create-post-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .create-post-modal.active {
            display: flex;
        }

        .modal-content {
            width: 90%;
            max-width: 600px;
            background: var(--bg-header);
            border-radius: 30px;
            overflow: hidden;
            animation: modalPop 0.4s ease;
        }

        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            color: var(--text-light);
        }

        .modal-header i {
            font-size: 24px;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.3s ease;
        }

        .modal-header i:hover {
            color: var(--danger);
            transform: rotate(90deg);
        }

        .modal-body {
            padding: 20px;
        }

        .post-input {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .post-user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            overflow: hidden;
            background: var(--primary);
        }

        .post-user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .post-textarea {
            flex: 1;
        }

        .post-textarea textarea {
            width: 100%;
            padding: 15px;
            background: var(--bg-input);
            border: none;
            border-radius: 15px;
            color: var(--text-light);
            font-size: 16px;
            resize: none;
            min-height: 120px;
        }

        .post-textarea textarea:focus {
            outline: none;
            box-shadow: 0 0 0 2px var(--primary);
        }

        .char-count {
            text-align: right;
            color: var(--text-muted);
            font-size: 12px;
            margin-top: 5px;
        }

        .post-media-preview {
            margin: 20px 0;
            padding: 20px;
            background: var(--bg-input);
            border-radius: 15px;
            text-align: center;
        }

        .post-media-preview img,
        .post-media-preview video {
            max-width: 100%;
            max-height: 300px;
            border-radius: 10px;
        }

        .post-options {
            display: flex;
            gap: 15px;
            margin: 20px 0;
        }

        .post-option {
            flex: 1;
            padding: 12px;
            background: var(--bg-input);
            border-radius: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .post-option:hover {
            background: var(--primary);
            transform: translateY(-2px);
        }

        .post-option i {
            margin-right: 8px;
        }

        .post-submit {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .post-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 168, 132, 0.4);
        }

        /* Story Viewer */
        .story-viewer {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .story-viewer.active {
            display: flex;
        }

        .story-progress {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            height: 3px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        .story-progress-bar {
            height: 100%;
            background: var(--primary);
            width: 0%;
            animation: progress 5s linear;
        }

        @keyframes progress {
            to { width: 100%; }
        }

        .story-info {
            position: absolute;
            top: 40px;
            left: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
        }

        .story-info img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        .story-content {
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        .story-content img,
        .story-content video {
            width: 100%;
            border-radius: 20px;
        }

        .story-close {
            position: absolute;
            top: 40px;
            right: 40px;
            font-size: 30px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .story-close:hover {
            transform: rotate(90deg);
            color: var(--danger);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--bg-header);
            color: var(--text-light);
            padding: 15px 25px;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border-left: 4px solid var(--primary);
            z-index: 3000;
            animation: toastSlide 0.3s ease;
        }

        @keyframes toastSlide {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .toast.error {
            border-left-color: var(--danger);
        }

        .toast.warning {
            border-left-color: var(--warning);
        }

        /* Loading Spinner */
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--bg-input);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .main-content {
                flex-direction: column;
            }
            
            .left-sidebar,
            .center-content,
            .right-sidebar {
                width: 100%;
                position: static;
                height: auto;
            }
            
            .nav-menu {
                display: none;
            }
        }

        @media (max-width: 768px) {
            .auth-card {

            <div class="right-sidebar">
                <div class="trending-header">
                    <h3><i class="fas fa-fire"></i> Trending</h3>
                </div>
                <div class="trending-list" id="trendingList"></div>
                
                <div class="suggested-users">
                    <h4>Suggested for you</h4>
                    <div id="suggestedUsers"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Create Post Modal -->
    <div class="create-post-modal" id="createPostModal">
        <div class="modal-content">

            </div>
            <div class="modal-body">
                <div class="post-input">
                    <div class="post-user-avatar" id="postUserAvatar">
                        <i class="fas fa-user"></i>
                        <img id="postUserAvatarImg" src="" style="display: none;">
                    </div>
                    <div class="post-textarea">
                        <textarea id="postText" placeholder="What's on your mind?" maxlength="500"></textarea>
                        <div class="char-count"><span id="charCount">0</span>/500</div>

                <div class="post-options">

    <!-- Story Viewer -->
    <div class="story-viewer" id="storyViewer" onclick="closeStory()">
        <div class="story-progress">

        </div>
        <div class="story-info" id="storyInfo"></div>
        <div class="story-content" id="storyContent"></div>
        <div class="story-close" onclick="closeStory()">
            <i class="fas fa-times"></i>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer"></div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyC5a7AmwYgCJtan_c2BVDZVU9z7s29vwvQ",
            authDomain: "divinex-edc56.firebaseapp.com",
            databaseURL: "https://divinex-edc56-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "divinex-edc56",
            storageBucket: "divinex-edc56.firebasestorage.app",
            messagingSenderId: "62193852994",
            appId: "1:62193852994:web:e582135f2815a1aa1a43db"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();
        const storage = firebase.storage();

        // Global variables
        let currentUser = null;
        let selectedPostFile = null;
        let trends = [
            { category: 'Technology', name: '#DivineX', posts: '125K' },
            { category: 'Trending', name: 'New Features', posts: '85K' },
            { category: 'Community', name: 'Welcome', posts: '234K' },
            { category: 'Updates', name: 'Version 2.0', posts: '56K' }
        ];

        // Initialize particles
        particlesJS('particles-js', {
            particles: {
                number: { value: 80, density: { enable: true, value_area: 800 } },
                color: { value: '#00a884' },
                shape: { type: 'circle' },
                opacity: { value: 0.3, random: true },
                size: { value: 3, random: true },
                line_linked: {
                    enable: true,
                    distance: 150,
                    color: '#00a884',
                    opacity: 0.2,
                    width: 1
                },
                move: { enable: true, speed: 2 }
            }
        });

        // Hash password
        function hashPassword(password) {
            return CryptoJS.SHA256(password).toString();
        }

        // Show toast
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-exclamation-triangle'}"></i>
                <span>${message}</span>
            `;
            document.getElementById('toastContainer').appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        // Switch auth tab
        function switchAuthTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => {
                t.classList.remove('active');
            });
            event.currentTarget.classList.add('active');
            
            document.getElementById('loginForm').classList.toggle('active', tab === 'login');
            document.getElementById('registerForm').classList.toggle('active', tab === 'register');
        }

        // Register
        async function register() {
            const username = document.getElementById('registerUsername').value.trim();
            const email = document.getElementById('registerEmail').value.trim();
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('registerConfirmPassword').value;

            if (!username || !email || !password) {
                showToast('All fields required', 'error');
                return;
            }

            if (password !== confirmPassword) {
                showToast('Passwords do not match', 'error');
                return;
            }

            try {
                const snapshot = await database.ref('usernames/' + username).once('value');
                if (snapshot.exists()) {
                    showToast('Username already taken', 'error');
                    return;
                }

                const credential = await auth.createUserWithEmailAndPassword(email, password);
                const user = credential.user;
                
                const hashedPassword = hashPassword(password);

                await database.ref('users/' + user.uid).set({
                    uid: user.uid,
                    username: username,
                    email: email,
                    password: hashedPassword,
                    photoURL: null,
                    bio: 'New to DivineX',
                    followers: 0,
                    following: 0,
                    posts: 0,
                    role: 'user',
                    banned: false,
                    createdAt: new Date().toISOString(),
                    lastSeen: new Date().toISOString(),
                    status: 'online'
                });

                await database.ref('usernames/' + username).set(user.uid);
                
                await createAdminIfNotExists();
                
                showToast('Registration successful!', 'success');

            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        // Login
        async function login() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!username || !password) {
                showToast('All fields required', 'error');
                return;
            }

            try {
                const uidSnapshot = await database.ref('usernames/' + username).once('value');
                const uid = uidSnapshot.val();

                if (!uid) {
                    showToast('User not found', 'error');
                    return;
                }

                const userSnapshot = await database.ref('users/' + uid).once('value');
                const userData = userSnapshot.val();

                if (!userData) {
                    showToast('User not found', 'error');
                    return;
                }

                if (userData.banned) {
                    showToast('You are banned from DivineX', 'error');
                    return;
                }

                const hashedInput = hashPassword(password);
                if (hashedInput !== userData.password) {
                    showToast('Invalid password', 'error');
                    return;
                }

                await auth.signInWithEmailAndPassword(userData.email, password);

            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        // Create admin
        async function createAdminIfNotExists() {
            const adminUsername = 'DivineX_Admin';
            const adminPassword = 'UnholyDaddyDivineX';
            const adminEmail = 'admin@divinex.com';
            
            const adminSnapshot = await database.ref('usernames/' + adminUsername).once('value');
            if (!adminSnapshot.exists()) {
                try {
                    const credential = await auth.createUserWithEmailAndPassword(adminEmail, adminPassword);
                    const adminUid = credential.user.uid;
                    
                    const hashedAdminPassword = hashPassword(adminPassword);
                    
                    await database.ref('users/' + adminUid).set({
                        uid: adminUid,
                        username: adminUsername,
                        email: adminEmail,
                        password: hashedAdminPassword,
                        photoURL: null,
                        bio: 'DivineX Administrator',
                        followers: 0,
                        following: 0,
                        posts: 0,
                        role: 'admin',
                        banned: false,
                        createdAt: new Date().toISOString(),
                        lastSeen: new Date().toISOString(),
                        status: 'online'
                    });
                    
                    await database.ref('usernames/' + adminUsername).set(adminUid);
                    
                    console.log('Admin created');
                } catch (error) {
                    console.error('Admin creation error:', error);
                }
            }
        }

        // Auth state observer
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const snapshot = await database.ref('users/' + user.uid).once('value');
                currentUser = snapshot.val();
                
                if (currentUser && !currentUser.banned) {
                    document.getElementById('authContainer').style.display = 'none';
                    document.getElementById('appContainer').style.display = 'block';
                    
                    if (currentUser.photoURL) {
                        document.getElementById('navProfile').innerHTML = `<img src="${currentUser.photoURL}">`;
                        document.getElementById('postUserAvatar').innerHTML = `<img src="${currentUser.photoURL}">`;
                    }
                    
                    loadChats();
                    loadStories();
                    loadFeed();
                    loadTrending();
                    loadSuggestedUsers();
                    
                    await database.ref('users/' + user.uid).update({
                        status: 'online',
                        lastSeen: new Date().toISOString()
                    });
                    
                    showToast(`Welcome, ${currentUser.username}!`, 'success');
                    
                } else {
                    auth.signOut();
                }
            } else {
                document.getElementById('authContainer').style.display = 'flex';
                document.getElementById('appContainer').style.display = 'none';
                currentUser = null;
            }
        });

        // Load chats
        function loadChats() {
            const chatList = document.getElementById('chatList');
            
            database.ref('users').once('value', (snapshot) => {
                const users = snapshot.val();
                let html = '';
                
                if (users) {
                    Object.values(users).forEach(user => {
                        if (user.uid !== currentUser.uid && !user.banned) {
                            html += `
                                <div class="chat-item" onclick="openChat('${user.uid}')">
                                    <div class="chat-avatar">
                                        ${user.photoURL ? 
                                            `<img src="${user.photoURL}">` : 
                                            `<i class="fas fa-user"></i>`
                                        }
                                    </div>
                                    <div class="chat-info">
                                        <div class="chat-name">
                                            ${user.username}
                                            ${user.role === 'admin' ? '<span style="background: var(--primary); padding: 2px 5px; border-radius: 3px; font-size: 10px;">Admin</span>' : ''}
                                        </div>
                                        <div class="chat-status">
                                            <span class="online-dot" style="background: ${user.status === 'online' ? 'var(--primary)' : 'var(--text-muted)'};"></span>
                                            ${user.status === 'online' ? 'Online' : moment(user.lastSeen).fromNow()}
                                        </div>
                                    </div>
                                </div>
                            `;
                        }
                    });
                }
                
                chatList.innerHTML = html || '<div style="padding: 20px; text-align: center;">No users found</div>';
            });
        }

        // Open chat
        function openChat(userId) {
            showToast('Chat feature coming soon!', 'warning');
        }

        // Search chats
        function searchChats() {
            const search = document.getElementById('chatSearch').value.toLowerCase();
            const items = document.querySelectorAll('.chat-item');
            
            items.forEach(item => {
                const name = item.querySelector('.chat-name').textContent.toLowerCase();
                item.style.display = name.includes(search) ? 'flex' : 'none';
            });
        }

        // Load stories
        function loadStories() {
            const storiesContainer = document.getElementById('storiesContainer');
            
            database.ref('users').limitToFirst(10).once('value', (snapshot) => {
                const users = snapshot.val();
                let html = `
                    <div class="story-item" onclick="createStory()">
                        <div class="story-ring" style="background: linear-gradient(45deg, var(--primary), var(--primary-light));">
                            <div class="story-avatar">
                                ${currentUser.photoURL ? 
                                    `<img src="${currentUser.photoURL}">` : 
                                    `<i class="fas fa-plus" style="display: flex; align-items: center; justify-content: center; height: 100%;"></i>`
                                }
                            </div>
                        </div>
                        <div class="story-name">Your Story</div>
                    </div>
                `;
                
                if (users) {
                    Object.values(users).forEach(user => {
                        if (user.uid !== currentUser.uid && !user.banned) {
                            html += `
                                <div class="story-item" onclick="viewStory('${user.uid}')">
                                    <div class="story-ring">
                                        <div class="story-avatar">
                                            ${user.photoURL ? 
                                                `<img src="${user.photoURL}">` : 
                                                `<i class="fas fa-user"></i>`
                                            }
                                        </div>
                                    </div>
                                    <div class="story-name">${user.username}</div>
                                </div>
                            `;
                        }
                    });
                }
                
                storiesContainer.innerHTML = html;
            });
        }

        // Create story
        function createStory() {
            showToast('Create story feature coming soon!', 'warning');
        }

        // View story
        function viewStory(userId) {
            const viewer = document.getElementById('storyViewer');
            const progress = document.getElementById('storyProgress');
            const info = document.getElementById('storyInfo');
            const content = document.getElementById('storyContent');
            
            database.ref('users/' + userId).once('value', (snapshot) => {
                const user = snapshot.val();
                
                info.innerHTML = `
                    <img src="${user.photoURL || 'https://via.placeholder.com/40'}" onerror="this.src='https://via.placeholder.com/40'">
                    <span>${user.username}</span>
                `;
                
                content.innerHTML = `
                    <div style="background: linear-gradient(135deg, var(--primary), var(--primary-dark)); padding: 100px; border-radius: 20px;">
                        <i class="fas fa-image" style="font-size: 50px; color: white;"></i>
                        <p style="color: white; margin-top: 20px;">Sample Story</p>
                    </div>
                `;
                
                viewer.classList.add('active');
                
                progress.style.width = '0%';
                progress.style.animation = 'none';
                setTimeout(() => {
                    progress.style.animation = 'progress 5s linear';
                }, 10);
                
                setTimeout(() => {
                    closeStory();
                }, 5000);
            });
        }

        // Close story
        function closeStory() {
            document.getElementById('storyViewer').classList.remove('active');
        }

        // Load feed
        function loadFeed() {
            const feedContainer = document.getElementById('feedPosts');
            
            const samplePosts = [
                {
                    id: 1,
                    username: 'DivineX',
                    avatar: null,
                    time: '2h ago',
                    content: 'Welcome to DivineX! The ultimate social experience! 🚀',
                    media: null,
                    likes: 1234,
                    comments: 89,
                    liked: false
                },
                {
                    id: 2,
                    username: 'Community',
                    avatar: null,
                    time: '4h ago',
                    content: 'New features coming soon! Stay tuned! 🔥',
                    media: 'https://via.placeholder.com/600x400',
                    likes: 2345,
                    comments: 123,
                    liked: true
                },
                {
                    id: 3,
                    username: 'Updates',
                    avatar: null,
                    time: '6h ago',
                    content: 'Welcome all new users! #DivineX',
                    media: null,
                    likes: 5678,
                    comments: 234,
                    liked: false
                }
            ];
            
            let html = '';
            
            samplePosts.forEach(post => {
                html += `
                    <div class="feed-post">
                        <div class="post-header">
                            <div class="post-user">
                                <div class="post-avatar">
                                    <i class="fas fa-user"></i>
                                </div>
                                <div>
                                    <div class="post-username">${post.username}</div>
                                    <div class="post-time">${post.time}</div>
                                </div>
                            </div>
                            <i class="fas fa-ellipsis-h"></i>
                        </div>
                        <div class="post-content">
                            <div class="post-text">${post.content}</div>
                            ${post.media ? `
                                <div class="post-media">
                                    <img src="${post.media}">
                                </div>
                            ` : ''}
                        </div>
                        <div class="post-actions">
                            <div class="post-action ${post.liked ? 'liked' : ''}" onclick="likePost(${post.id})">
                                <i class="fas ${post.liked ? 'fa-heart' : 'fa-heart'}"></i>
                                <span>${post.likes}</span>
                            </div>
                            <div class="post-action" onclick="commentPost(${post.id})">
                                <i class="fas fa-comment"></i>
                                <span>${post.comments}</span>
                            </div>
                            <div class="post-action" onclick="sharePost(${post.id})">
                                <i class="fas fa-share"></i>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            feedContainer.innerHTML = html;
        }

        // Like post
        function likePost(postId) {
            showToast('Post liked!', 'success');
        }

        // Comment on post
        function commentPost(postId) {
            showToast('Comment feature coming soon!', 'warning');
        }

        // Share post
        function sharePost(postId) {
            showToast('Share feature coming soon!', 'warning');
        }

        // Load trending
        function loadTrending() {
            const trendingList = document.getElementById('trendingList');
            let html = '';
            
            trends.forEach(trend => {
                html += `
                    <div class="trend-item" onclick="searchTrend('${trend.name}')">
                        <div class="trend-category">${trend.category}</div>
                        <div class="trend-name">${trend.name}</div>
                        <div class="trend-stats">${trend.posts} posts</div>
                    </div>
                `;
            });
            
            trendingList.innerHTML = html;
        }

        // Search trend
        function searchTrend(trend) {
            showToast(`Searching for ${trend}...`, 'warning');
        }

        // Load suggested users
        function loadSuggestedUsers() {
            const suggestedContainer = document.getElementById('suggestedUsers');
            
            database.ref('users').limitToFirst(5).once('value', (snapshot) => {
                const users = snapshot.val();
                let html = '';
                
                if (users) {
                    Object.values(users).forEach(user => {
                        if (user.uid !== currentUser.uid && !user.banned) {
                            html += `
                                <div class="suggested-user">
                                    <div class="suggested-avatar">
                                        ${user.photoURL ? 
                                            `<img src="${user.photoURL}">` : 
                                            `<i class="fas fa-user"></i>`
                                        }
                                    </div>
                                    <div class="suggested-info">
                                        <div class="suggested-name">${user.username}</div>
                                        <div class="suggested-bio">${user.bio || 'New user'}</div>
                                    </div>
                                    <button class="follow-btn" onclick="followUser('${user.uid}', this)">Follow</button>
                                </div>
                            `;
                        }
                    });
                }
                
                suggestedContainer.innerHTML = html;
            });
        }

        // Follow user
        function followUser(userId, btn) {
            if (btn.classList.contains('following')) {
                btn.classList.remove('following');
                btn.textContent = 'Follow';
                showToast('Unfollowed user', 'success');
            } else {
                btn.classList.add('following');
                btn.textContent = 'Following';
                showToast('Following user', 'success');
            }
        }

        // Show create post modal
        function showCreatePost() {
            document.getElementById('createPostModal').classList.add('active');
            
            const textarea = document.getElementById('postText');
            textarea.addEventListener('input', function() {
                document.getElementById('charCount').textContent = this.value.length;
            });
        }

        // Close create post
        function closeCreatePost() {
            document.getElementById('createPostModal').classList.remove('active');
            document.getElementById('postText').value = '';
            document.getElementById('postMediaPreview').style.display = 'none';
            document.getElementById('postMediaPreview').innerHTML = '';
            selectedPostFile = null;
        }

        // Upload post image
        function uploadPostImage() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    selectedPostFile = file;
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const preview = document.getElementById('postMediaPreview');
                        preview.innerHTML = `<img src="${e.target.result}">`;
                        preview.style.display = 'block';
                    };
                    reader.readAsDataURL(file);
                }
            };
            input.click();
        }

        // Upload post video
        function uploadPostVideo() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'video/*';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    selectedPostFile = file;
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const preview = document.getElementById('postMediaPreview');
                        preview.innerHTML = `<video controls src="${e.target.result}"></video>`;
                        preview.style.display = 'block';
                    };
                    reader.readAsDataURL(file);
                }
            };
            input.click();
        }

        // Create post
        async function createPost() {
            const text = document.getElementById('postText').value.trim();
            
            if (!text && !selectedPostFile) {
                showToast('Please enter text or select media', 'error');
                return;
            }
            
            const post = {
                userId: currentUser.uid,
                username: currentUser.username,
                text: text,
                timestamp: new Date().toISOString(),
                likes: 0,
                comments: 0
            };
            
            if (selectedPostFile) {
                try {
                    const fileRef = storage.ref('posts/' + Date.now() + '_' + selectedPostFile.name);
                    await fileRef.put(selectedPostFile);
                    const url = await fileRef.getDownloadURL();
                    
                    post.media = {
                        url: url,
                        type: selectedPostFile.type
                    };
                } catch (error) {
                    showToast(error.message, 'error');
                    return;
                }
            }
            
            await database.ref('posts').push(post);
            
            closeCreatePost();
            showToast('Post created successfully!', 'success');
            loadFeed();
        }

        // Switch tab
        function switchTab(tab) {
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            event.currentTarget.classList.add('active');
            
            if (tab === 'profile') {
                showProfileModal();
            } else if (tab === 'explore') {
                showToast('Explore feature coming soon!', 'warning');
            } else if (tab === 'notifications') {
                showToast('Notifications feature coming soon!', 'warning');
            }
        }

        // Show profile modal
        function showProfileModal() {
            showToast('Profile feature coming soon!', 'warning');
        }

        // Logout
        async function logout() {
            if (currentUser) {
                await database.ref('users/' + currentUser.uid).update({
                    status: 'offline',
                    lastSeen: new Date().toISOString()
                });
            }
            
            auth.signOut();
            showToast('Logged out successfully', 'success');
        }
    </script>
</body>
</html>
